<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Math Quiz Game for Kids</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #3a2410;
    --ink-soft: #6b4a26;
    --cream: #fff6e6;
    --stroke: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1a1226;
    font-family: "Baloo 2", system-ui, "Segoe UI", sans-serif;
    touch-action: manipulation;
    overscroll-behavior: none;
  }

  body {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /*
   * Responsive game stage.
   * - Mobile/portrait: fills the whole screen (no letterbox bars), background covers.
   * - Wider screens (tablet/desktop): capped to a 9:16 portrait, centered.
   * - Uses dvh/dvw so the mobile address bar never cuts off content.
   */
  #stage {
    position: relative;
    width: 100vw;
    height: 100vh;
    width: 100dvw;
    height: 100dvh;
    max-width: calc(100vh * 9 / 16);
    max-width: calc(100dvh * 9 / 16);
    margin: 0 auto;
    container-type: size;
    overflow: hidden;
    background: #2a1d3d;
    box-shadow: 0 0 8vmin rgba(0,0,0,0.6);
    user-select: none;
  }

  .screen {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background-size: cover;
    background-position: center;
    z-index: 1;
  }
  .screen.active { display: flex; }

  /* Full-screen background image (in HTML, shown in full behind every screen) */
  #stage-bg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* Backgrounds: start & quiz are transparent so #stage-bg shows through.
     Result keeps its own tiered background on top. */
  #screen-start  { background: transparent; }
  #screen-quiz   { background: transparent; justify-content: flex-start; padding-top: 2.5cqh; }
  #screen-result { background-image: url("assets/bg_jungle_win.png"); }

  /* ---- Text styled to read like game art (heavy stroke, no plain UI feel) ---- */
  .game-title {
    margin-top: 1cqh;
    width: 86cqw;
    text-align: center;
    color: #fff;
    font-weight: 900;
    font-size: 11cqw;
    line-height: 1.15;
    -webkit-text-stroke: 1.2cqw var(--ink);
    paint-order: stroke fill;
    text-shadow: 0 1cqh 0 rgba(0,0,0,0.35);
  }
  .game-sub {
    margin-top: 1cqh;
    color: #ffe9b0;
    font-weight: 700;
    font-size: 5cqw;
    -webkit-text-stroke: 0.5cqw var(--ink);
    paint-order: stroke fill;
  }

  .section-label {
    margin-top: 2.6cqh;
    color: #fff;
    font-weight: 900;
    font-size: 5.4cqw;
    -webkit-text-stroke: 0.6cqw var(--ink);
    paint-order: stroke fill;
  }

  /* ---- Buttons: visuals come from image assets, not CSS shapes ---- */
  .btn {
    border: 0;
    background: transparent center/100% 100% no-repeat;
    color: #fff;
    font-family: inherit;
    font-weight: 900;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2cqw;
    padding: 0 5%;
    white-space: nowrap;
    line-height: 1;
    -webkit-text-stroke: 0.7cqw var(--ink);
    paint-order: stroke fill;
    transition: transform .08s ease, filter .08s ease;
  }
  .btn:active { transform: scale(0.94); }
  .btn.selected { filter: brightness(1.12) drop-shadow(0 0 2.4cqw #ffd34d); transform: scale(1.04); }

  .grid-ops {
    margin-top: 2.4cqh;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 3cqw 4cqw;
    width: 78cqw;
  }
  .btn-op {
    background-image: url("assets/btn_wood.png");
    aspect-ratio: 1382 / 531;
    font-size: 7.2cqw;
  }
  .btn-op .op-name {
    font-size: 5cqw;
    -webkit-text-stroke: 0.45cqw var(--ink);
  }
  .btn-op-text .op-symbol { display: none; }
  .btn-op-text .op-name { font-size: 5cqw; }

  .grid-diff {
    margin-top: 2.4cqh;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 3cqw;
    width: 90cqw;
  }
  .btn-diff {
    background-image: url("assets/btn_wood.png");
    width: 100%;
    aspect-ratio: 1382 / 531;
    font-size: 4.4cqw;
  }

  .btn-primary {
    background-image: url("assets/btn_wood.png");
    width: 54cqw;
    aspect-ratio: 1382 / 531;
    font-size: 5.4cqw;
  }
  #start-wrap { margin-top: 3.5cqh; }

  /* ---- Quiz HUD ---- */
  .hud {
    margin-top: 1.5cqh;
    width: 90cqw;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2cqw;
  }
  .hud-pill {
    min-width: 28cqw;
    padding: 1.4cqh 2cqw;
    background: url("assets/panel.png") center/100% 100% no-repeat;
    text-align: center;
    color: #fff;
    font-weight: 900;
    font-size: 4.2cqw;
    -webkit-text-stroke: 0.5cqw var(--ink);
    paint-order: stroke fill;
  }
  .btn-pause {
    flex: 0 0 auto;
    width: 13cqw;
    height: 13cqw;
    background-image: url("assets/btn_pause.png");
  }

  /* ===== Pause popup ===== */
  #pause-overlay {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(20, 10, 30, 0.6);
    z-index: 60;
  }
  #pause-overlay.show { display: flex; }
  .pause-window {
    width: 80cqw;
    padding: 7cqh 6cqw;
    background: url("assets/panel.png") center/100% 100% no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3cqh;
    animation: pop .25s ease;
  }
  .pause-title {
    color: #5a3200;
    font-weight: 900;
    font-size: 8cqw;
    -webkit-text-stroke: 0.5cqw #fff4d6;
    paint-order: stroke fill;
  }
  .pause-window .btn {
    width: 62cqw;
    font-size: 5.8cqw;
  }
  .btn-resume { background-image: url("assets/btn_wood.png"); aspect-ratio: 1382 / 531; }
  .btn-quit {
    background-image: url("assets/btn_wood.png");
    aspect-ratio: 1382 / 531;
    filter: hue-rotate(-28deg) saturate(1.45) brightness(0.97);
  }

  /* Progress gauge built from image assets (wooden frame + glossy fill) */
  .gauge {
    position: relative;
    margin-top: 2.2cqh;
    width: 84cqw;
  }
  .gauge-frame { display: block; width: 100%; height: auto; }
  #progress-fill {
    position: absolute;
    top: 24%;
    left: 6%;
    width: 88%;
    height: 52%;
    background: url("assets/gauge_fill.png") left center / 100% 100% no-repeat;
    clip-path: inset(0 100% 0 0);
    transition: clip-path .25s ease;
  }

  .question-window {
    margin-top: 2.5cqh;
    width: 90cqw;
    aspect-ratio: 1444 / 676;
    background: url("assets/panel.png") center/100% 100% no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #question-text {
    color: #fff;
    font-weight: 900;
    font-size: 12cqw;
    white-space: nowrap;
    text-align: center;
    -webkit-text-stroke: 1cqw var(--ink);
    paint-order: stroke fill;
  }
  /* Long multi-term expressions: shrink so they fit on one line */
  #question-text.q-long {
    font-size: 7.4cqw;
    -webkit-text-stroke: 0.7cqw var(--ink);
  }

  .answers {
    margin-top: 7cqh;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 4.5cqh 7cqw;
    width: 88cqw;
    align-items: start;
  }
  .btn-answer {
    position: relative;
    background-image: url("assets/answer_platform.png");
    aspect-ratio: 1311 / 664;
    overflow: visible;
    filter: drop-shadow(0 0.5cqh 0.4cqw rgba(0,0,0,0.18));
    transition: transform .12s ease, filter .12s ease;
  }
  /* Number sits inside a small wooden button centered on the grass mound */
  .answer-chip {
    position: absolute;
    left: 50%;
    top: 10%;
    transform: translate(-50%, -50%);
    width: 40%;
    aspect-ratio: 851 / 857;
    background: url("assets/num_btn.png") center/100% 100% no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    padding-bottom: 5%;
    color: #fff;
    font-size: 8cqw;
    -webkit-text-stroke: 0.7cqw var(--ink);
    paint-order: stroke fill;
    text-shadow: 0 0.4cqh 0 rgba(0,0,0,0.25);
  }
  .answer-chip.small { font-size: 6.2cqw; }
  .answer-chip.xsmall { font-size: 5cqw; }
  .btn-answer:active { transform: scale(0.93); }
  .btn-answer.correct { filter: drop-shadow(0 0 3cqw #4dff7a) brightness(1.06); transform: scale(1.04); }
  .btn-answer.wrong { filter: drop-shadow(0 0 3cqw #ff5a5a) grayscale(0.25) brightness(0.92); }
  .answers.locked .btn-answer { pointer-events: none; }

  /* Jungle mascot (decorative character) */
  #quiz-mascot {
    position: absolute;
    left: 2cqw;
    bottom: 1.5cqh;
    width: 21cqw;
    pointer-events: none;
    z-index: 5;
    filter: drop-shadow(0 1cqh 1cqw rgba(0,0,0,0.25));
    animation: pop .45s ease;
  }

  /* Feedback badge overlay */
  #feedback {
    position: absolute;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(20,10,30,0.25);
  }
  #feedback.show { display: flex; }
  #feedback img {
    width: 42cqw;
    height: 42cqw;
    object-fit: contain;
    filter: drop-shadow(0 1cqh 1.5cqw rgba(0,0,0,0.35));
    animation: pop .35s ease;
  }
  @keyframes pop {
    0% { transform: scale(0.2); opacity: 0; }
    70% { transform: scale(1.15); opacity: 1; }
    100% { transform: scale(1); }
  }

  /* ---- Result ---- */
  #screen-result { justify-content: center; }
  #result-badge { width: 50cqw; height: 50cqw; object-fit: contain; margin-bottom: 2cqh; filter: drop-shadow(0 1cqh 2cqw rgba(0,0,0,0.3)); animation: pop .4s ease; }
  #result-score {
    color: #fff;
    font-weight: 900;
    font-size: 13cqw;
    -webkit-text-stroke: 1cqw var(--ink);
    paint-order: stroke fill;
  }
  #result-message {
    margin-top: 1cqh;
    color: #ffe9b0;
    font-weight: 700;
    font-size: 6cqw;
    -webkit-text-stroke: 0.5cqw var(--ink);
    paint-order: stroke fill;
  }
  #result-detail {
    margin-top: 1.6cqh;
    display: flex;
    gap: 6cqw;
    font-weight: 800;
    font-size: 5.4cqw;
    -webkit-text-stroke: 0.5cqw var(--ink);
    paint-order: stroke fill;
  }
  #result-detail .rc-correct { color: #8bef76; }
  #result-detail .rc-wrong { color: #ff8a8a; }
  #replay-wrap { margin-top: 5cqh; position: relative; z-index: 2; }
  #confetti {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }
  #result-badge, #result-score, #result-message, #result-detail { position: relative; z-index: 2; }
</style>
</head>
<body>
  <div id="stage">

    <img id="stage-bg" src="assets/jungle-background.png" alt="" />

    <!-- ===== START SCREEN ===== -->
    <section id="screen-start" class="screen active">
      <h1 class="game-title">Math Quiz</h1>
      <div class="game-sub">Pick an option and start playing!</div>

      <div class="section-label">Operation</div>
      <div class="grid-ops" id="ops"></div>

      <div class="section-label">Level</div>
      <div class="grid-diff" id="diffs"></div>

      <div id="start-wrap">
        <button class="btn btn-primary" id="start-btn">Start</button>
      </div>
    </section>

    <!-- ===== QUIZ SCREEN ===== -->
    <section id="screen-quiz" class="screen">
      <div class="hud">
        <button class="btn btn-pause" id="pause-btn" aria-label="Pause"></button>
        <div class="hud-pill" id="hud-progress">Question 1/10</div>
        <div class="hud-pill" id="hud-score">Score 0</div>
      </div>

      <div class="gauge">
        <img class="gauge-frame" src="assets/gauge_frame.png" alt="" />
        <div id="progress-fill"></div>
      </div>

      <div class="question-window"><div id="question-text">0 + 0 = ?</div></div>

      <div class="answers" id="answers"></div>

      <img id="quiz-mascot" src="assets/mascot_turtle.png" alt="" />

      <div id="feedback"><img id="feedback-img" alt="" /></div>

      <div id="pause-overlay">
        <div class="pause-window">
          <div class="pause-title">Paused</div>
          <button class="btn btn-resume" id="resume-btn">Resume</button>
          <button class="btn btn-quit" id="quit-btn">Quit</button>
        </div>
      </div>
    </section>

    <!-- ===== RESULT SCREEN ===== -->
    <section id="screen-result" class="screen">
      <canvas id="confetti"></canvas>
      <img id="result-badge" alt="" />
      <div id="result-score">0/10</div>
      <div id="result-detail"></div>
      <div id="result-message"></div>
      <div id="replay-wrap">
        <button class="btn btn-primary" id="replay-btn">Play Again</button>
      </div>
    </section>
  </div>
<script>
  /* ===== Tunable constants ===== */
  const TOTAL_QUESTIONS = 10;
  const OPTION_COUNT = 4;

  const OPERATIONS = [
    { id: "add", symbol: "+", name: "Add" },
    { id: "sub", symbol: "−", name: "Subtract" },
    { id: "mul", symbol: "×", name: "Multiply" },
    { id: "div", symbol: "÷", name: "Divide" },
    { id: "mix", symbol: "", name: "Mixed", text: true },
    { id: "expr", symbol: "", name: "Expression", text: true },
  ];
  const BASE_OPS = ["add", "sub", "mul", "div"];

  const DIFFICULTIES = [
    { id: "easy",   name: "Easy",   addSubMax: 10, mulMax: 5 },
    { id: "medium", name: "Medium", addSubMax: 20, mulMax: 10 },
    { id: "hard",   name: "Hard",   addSubMax: 50, mulMax: 12 },
  ];

  const ASSETS = {
    correct: "assets/badge_correct.png",
    wrong: "assets/badge_wrong.png",
    trophy: "assets/trophy.png",
    tryAgain: "assets/badge_try.png",
  };

  /* ===== State ===== */
  const state = {
    score: 0,
    current: 0,
    total: TOTAL_QUESTIONS,
    operation: "add",
    difficulty: "easy",
    questions: [],
    paused: false,
    pendingAdvance: false,
    advanceTimer: null,
  };

  /* ===== Helpers ===== */
  const $ = (sel) => document.querySelector(sel);
  const rnd = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

  /* ===== Sound (Web Audio API — no external files, works offline) ===== */
  const Sound = {
    ctx: null,
    on: true,
    init() {
      if (!this.ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) this.ctx = new AC();
      }
      if (this.ctx && this.ctx.state === "suspended") this.ctx.resume();
    },
    tone(freq, start, dur, type, peak) {
      if (!this.on || !this.ctx) return;
      const t0 = this.ctx.currentTime + start;
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = type || "sine";
      osc.frequency.setValueAtTime(freq, t0);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(peak || 0.2, t0 + 0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.connect(g).connect(this.ctx.destination);
      osc.start(t0);
      osc.stop(t0 + dur + 0.03);
    },
    // Tap / select (button or answer)
    select() { this.init(); this.tone(620, 0, 0.07, "square", 0.1); this.tone(880, 0.05, 0.08, "sine", 0.1); },
    // Start / confirm
    confirm() { this.init(); this.tone(660, 0, 0.1, "square", 0.13); this.tone(990, 0.09, 0.18, "sine", 0.16); },
    // Correct answer (rising G5 -> C6)
    correct() {
      this.init();
      this.tone(784, 0.12, 0.12, "sine", 0.22);
      this.tone(1047, 0.23, 0.20, "sine", 0.22);
    },
    // Wrong answer (falling)
    wrong() {
      this.init();
      this.tone(311, 0.12, 0.18, "sawtooth", 0.18);
      this.tone(220, 0.27, 0.24, "sawtooth", 0.16);
    },
    // End of round
    finish(win) {
      this.init();
      if (win) {
        // Celebration fanfare: quick run + final chord + sparkle
        const run = [523.25, 659.25, 783.99, 1046.5, 1318.5];
        run.forEach((f, i) => this.tone(f, i * 0.1, 0.16, "triangle", 0.2));
        [523.25, 659.25, 783.99, 1046.5].forEach((f) => this.tone(f, 0.55, 0.7, "triangle", 0.15));
        this.tone(1568, 0.55, 0.6, "sine", 0.12);
        this.tone(2093, 0.7, 0.5, "sine", 0.1);
      } else {
        [392, 330, 262].forEach((f, i) => this.tone(f, i * 0.18, 0.26, "triangle", 0.18));
      }
    },
  };

  function showScreen(id) {
    document.querySelectorAll(".screen").forEach((s) => s.classList.remove("active"));
    $("#" + id).classList.add("active");
  }

  /* ===== Confetti (canvas particles — no library) ===== */
  const Confetti = {
    canvas: null, ctx: null, parts: [], raf: null, start: 0,
    init() {
      this.canvas = $("#confetti");
      this.ctx = this.canvas.getContext("2d");
    },
    burst() {
      const stage = $("#stage");
      const w = stage.clientWidth, h = stage.clientHeight;
      this.canvas.width = w;
      this.canvas.height = h;
      const colors = ["#ff5a5a", "#ffd34d", "#4dd0ff", "#7be36b", "#c47bff", "#ff9d2e", "#ffffff"];
      this.parts = [];
      for (let i = 0; i < 150; i++) {
        this.parts.push({
          x: Math.random() * w,
          y: -20 - Math.random() * h * 0.6,
          w: w * (0.012 + Math.random() * 0.014),
          h: w * (0.016 + Math.random() * 0.018),
          color: colors[Math.floor(Math.random() * colors.length)],
          vy: h * (0.004 + Math.random() * 0.006),
          vx: w * (-0.003 + Math.random() * 0.006),
          rot: Math.random() * Math.PI,
          vrot: -0.2 + Math.random() * 0.4,
          sway: Math.random() * Math.PI * 2,
        });
      }
      cancelAnimationFrame(this.raf);
      this.start = performance.now();
      this.loop();
    },
    loop() {
      const ctx = this.ctx, c = this.canvas;
      const t = performance.now() - this.start;
      ctx.clearRect(0, 0, c.width, c.height);
      let alive = false;
      const fade = t > 3000 ? Math.max(0, 1 - (t - 3000) / 1600) : 1;
      for (const p of this.parts) {
        p.y += p.vy;
        p.sway += 0.05;
        p.x += p.vx + Math.sin(p.sway) * (c.width * 0.002);
        p.rot += p.vrot;
        if (p.y < c.height + 30) alive = true;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = fade;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
      if (alive && t < 5000) {
        this.raf = requestAnimationFrame(() => this.loop());
      } else {
        ctx.clearRect(0, 0, c.width, c.height);
      }
    },
    stop() {
      cancelAnimationFrame(this.raf);
      if (this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
    },
  };

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  /* ===== Question generation ===== */
  function makeQuestion(opId, diff) {
    if (opId === "mix") {
      opId = BASE_OPS[rnd(0, BASE_OPS.length - 1)];
    }
    let a, b, answer, symbol;
    if (opId === "add") {
      a = rnd(0, diff.addSubMax); b = rnd(0, diff.addSubMax);
      answer = a + b; symbol = "+";
    } else if (opId === "sub") {
      a = rnd(0, diff.addSubMax); b = rnd(0, diff.addSubMax);
      if (b > a) [a, b] = [b, a];
      answer = a - b; symbol = "−";
    } else if (opId === "mul") {
      a = rnd(0, diff.mulMax); b = rnd(0, diff.mulMax);
      answer = a * b; symbol = "×";
    } else { // div -> build from a whole-number answer
      b = rnd(1, diff.mulMax);
      answer = rnd(0, diff.mulMax);
      a = b * answer; symbol = "÷";
    }
    return { text: a + " " + symbol + " " + b + " = ?", answer };
  }

  /* Multi-term expression, e.g. "3 + 2 − 9 × 2 = ?" (× before + / −) */
  function makeExpression(diff) {
    const opSyms = ["+", "−", "×"];
    const termCount = diff.id === "easy" ? 3 : 4;
    const mulMax = diff.id === "easy" ? 5 : (diff.id === "medium" ? 8 : 10);
    const addMax = Math.min(diff.addSubMax, 20);
    const opers = [];
    for (let i = 0; i < termCount - 1; i++) opers.push(opSyms[rnd(0, opSyms.length - 1)]);
    const nums = [];
    for (let i = 0; i < termCount; i++) {
      const nearMul = (i > 0 && opers[i - 1] === "×") || (i < opers.length && opers[i] === "×");
      nums.push(nearMul ? rnd(1, mulMax) : rnd(0, addMax));
    }
    let text = "" + nums[0];
    for (let i = 0; i < opers.length; i++) text += " " + opers[i] + " " + nums[i + 1];
    text += " = ?";
    return { text, answer: evalExpr(nums, opers) };
  }

  /* Evaluate with multiplication precedence, then left-to-right + / − */
  function evalExpr(nums, opers) {
    const n = nums.slice();
    const o = opers.slice();
    for (let i = 0; i < o.length; ) {
      if (o[i] === "×") { n[i] = n[i] * n[i + 1]; n.splice(i + 1, 1); o.splice(i, 1); }
      else i++;
    }
    let res = n[0];
    for (let i = 0; i < o.length; i++) res = o[i] === "+" ? res + n[i + 1] : res - n[i + 1];
    return res;
  }

  function makeOptions(answer, allowNeg) {
    const opts = new Set([answer]);
    let guard = 0;
    while (opts.size < OPTION_COUNT && guard < 300) {
      guard++;
      const delta = rnd(1, Math.max(4, Math.round(Math.abs(answer) * 0.4) + 3));
      const sign = Math.random() < 0.5 ? -1 : 1;
      const cand = answer + sign * delta;
      if (allowNeg || cand >= 0) opts.add(cand);
    }
    let v = answer - 3;
    while (opts.size < OPTION_COUNT) { if (!opts.has(v) && (allowNeg || v >= 0)) opts.add(v); v++; }
    return shuffle([...opts]);
  }

  function buildQuestions() {
    const diff = DIFFICULTIES.find((d) => d.id === state.difficulty);
    state.questions = [];
    for (let i = 0; i < state.total; i++) {
      let q;
      if (state.operation === "expr") {
        q = makeExpression(diff);
        q.options = makeOptions(q.answer, true);
      } else {
        q = makeQuestion(state.operation, diff);
        q.options = makeOptions(q.answer);
      }
      state.questions.push(q);
    }
  }

  /* ===== Start screen wiring ===== */
  function renderStartScreen() {
    const opsBox = $("#ops");
    opsBox.innerHTML = "";
    OPERATIONS.forEach((op) => {
      const b = document.createElement("button");
      b.className = "btn btn-op" + (op.text ? " btn-op-text" : "") + (op.id === state.operation ? " selected" : "");
      b.dataset.op = op.id;
      b.innerHTML = '<span class="op-symbol">' + op.symbol + '</span><span class="op-name">' + op.name + "</span>";
      b.addEventListener("click", () => {
        Sound.select();
        state.operation = op.id;
        renderStartScreen();
      });
      opsBox.appendChild(b);
    });

    const diffBox = $("#diffs");
    diffBox.innerHTML = "";
    DIFFICULTIES.forEach((d) => {
      const b = document.createElement("button");
      b.className = "btn btn-diff" + (d.id === state.difficulty ? " selected" : "");
      b.textContent = d.name;
      b.addEventListener("click", () => {
        Sound.select();
        state.difficulty = d.id;
        renderStartScreen();
      });
      diffBox.appendChild(b);
    });
  }

  /* ===== Quiz flow ===== */
  function startGame() {
    Sound.confirm();
    state.score = 0;
    state.current = 0;
    buildQuestions();
    showScreen("screen-quiz");
    renderQuestion();
  }

  function setProgress(pct) {
    $("#progress-fill").style.clipPath = "inset(0 " + (100 - pct) + "% 0 0)";
  }

  function renderQuestion() {
    const q = state.questions[state.current];
    const qt = $("#question-text");
    qt.textContent = q.text;
    qt.classList.toggle("q-long", q.text.length > 11);
    $("#hud-progress").textContent = "Question " + (state.current + 1) + "/" + state.total;
    $("#hud-score").textContent = "Score " + state.score;
    setProgress((state.current / state.total) * 100);

    const box = $("#answers");
    box.className = "answers";
    box.innerHTML = "";
    q.options.forEach((val) => {
      const b = document.createElement("button");
      b.className = "btn btn-answer";
      const txt = String(val);
      const sizeCls = txt.length >= 4 ? " xsmall" : (txt.length === 3 ? " small" : "");
      b.innerHTML = '<span class="answer-chip' + sizeCls + '">' + txt + "</span>";
      b.addEventListener("click", () => onAnswer(b, val, q.answer));
      box.appendChild(b);
    });
  }

  function onAnswer(btn, picked, answer) {
    const box = $("#answers");
    box.classList.add("locked");
    Sound.select();
    const correct = picked === answer;
    if (correct) {
      state.score++;
      btn.classList.add("correct");
      Sound.correct();
    } else {
      btn.classList.add("wrong");
      [...box.children].forEach((c) => {
        if (Number(c.textContent) === answer) c.classList.add("correct");
      });
      Sound.wrong();
    }
    $("#hud-score").textContent = "Score " + state.score;
    showFeedback(correct);

    state.pendingAdvance = true;
    state.advanceTimer = setTimeout(advanceQuestion, 1000);
  }

  function advanceQuestion() {
    state.pendingAdvance = false;
    state.advanceTimer = null;
    hideFeedback();
    state.current++;
    if (state.current >= state.total) {
      showResult();
    } else {
      renderQuestion();
    }
  }

  /* ===== Pause / Resume / Quit ===== */
  function openPause() {
    if (state.paused) return;
    state.paused = true;
    if (state.advanceTimer) { clearTimeout(state.advanceTimer); state.advanceTimer = null; }
    Sound.select();
    $("#pause-overlay").classList.add("show");
  }

  function resumeGame() {
    if (!state.paused) return;
    state.paused = false;
    Sound.select();
    $("#pause-overlay").classList.remove("show");
    if (state.pendingAdvance) {
      state.advanceTimer = setTimeout(advanceQuestion, 500);
    }
  }

  function quitGame() {
    state.paused = false;
    state.pendingAdvance = false;
    if (state.advanceTimer) { clearTimeout(state.advanceTimer); state.advanceTimer = null; }
    Sound.select();
    $("#pause-overlay").classList.remove("show");
    hideFeedback();
    showScreen("screen-start");
  }

  function showFeedback(correct) {
    const fb = $("#feedback");
    $("#feedback-img").src = correct ? ASSETS.correct : ASSETS.wrong;
    fb.classList.add("show");
  }
  function hideFeedback() { $("#feedback").classList.remove("show"); }

  /* ===== Result ===== */
  function showResult() {
    setProgress(100);
    const score = state.score;
    const total = state.total;
    $("#result-score").textContent = score + "/" + total;

    let msg, badge, bg;
    const ratio = score / total;
    const win = ratio >= 0.7;
    if (ratio === 1) { msg = "Perfect!"; badge = ASSETS.trophy; bg = "bg_jungle_win.png"; }
    else if (ratio >= 0.7) { msg = "Great job!"; badge = ASSETS.trophy; bg = "bg_jungle_win.png"; }
    else if (ratio >= 0.4) { msg = "Good! Keep practicing"; badge = ASSETS.correct; bg = "bg_jungle_mid.png"; }
    else { msg = "Don't give up! Try again"; badge = ASSETS.tryAgain; bg = "bg_jungle_lose.png"; }

    $("#result-message").textContent = msg;
    $("#result-detail").innerHTML =
      '<span class="rc-correct">Correct: ' + score + '</span>' +
      '<span class="rc-wrong">Wrong: ' + (total - score) + "</span>";
    $("#result-badge").src = badge;
    $("#screen-result").style.backgroundImage = 'url("assets/' + bg + '")';
    showScreen("screen-result");

    Sound.finish(win);
    if (win) {
      requestAnimationFrame(() => Confetti.burst());
    } else {
      Confetti.stop();
    }
  }

  /* ===== Init ===== */
  Confetti.init();
  $("#start-btn").addEventListener("click", startGame);
  $("#replay-btn").addEventListener("click", () => { Sound.select(); Confetti.stop(); showScreen("screen-start"); });
  $("#pause-btn").addEventListener("click", openPause);
  $("#resume-btn").addEventListener("click", resumeGame);
  $("#quit-btn").addEventListener("click", quitGame);
  renderStartScreen();
</script>
</body>
</html>
